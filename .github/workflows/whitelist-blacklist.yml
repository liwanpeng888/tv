name: 'WhiteList BlackList'
on:
  schedule:
    - cron: '0 16 * * 4'
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1 
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg && ffmpeg -version && ffprobe -version
        
      - name: Install Cloudflare WARP
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gpg lsb-release
          # 添加 Cloudflare WARP 仓库
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp

      - name: Register and connect to WARP (with IPv6 connectivity check)
        run: |
          # 注册 WARP 客户端
          sudo warp-cli --accept-tos registration new

          # 连接到 WARP
          sudo warp-cli --accept-tos connect

          # 智能等待，直到 IPv6 连接成功
          MAX_ATTEMPTS=6
          ATTEMPT=1
          echo "Waiting for IPv6 connectivity (max 1 minute)..."
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            # 尝试通过 IPv6 访问一个已知的 IPv6 服务
            if curl -6 -s -o /dev/null https://ipv6.test-ipv6.com/; then
              echo "✅ IPv6 connectivity established!"
              break
            fi
            echo "Attempt $ATTEMPT failed. Waiting 10 seconds..."
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
            echo "❌ Failed to establish IPv6 connectivity."
            exit 1
          fi

      - name: 验证 IPv6 配置
        run: |
          echo "--- WARP Status ---"
          sudo warp-cli --accept-tos status
          echo "--- Public IPv6 Address ---"
          curl -6 -s https://ifconfig.co
          echo "--- Ping6 Test ---"
          ping6 -c 4 ipv6.google.com || echo "Ping6 may be blocked, but IPv6 for HTTP is working."

      - name: 运行脚本
        run: |
          chmod +x assets/whitelist-blacklist/main.py
          python assets/whitelist-blacklist/main.py

      - name: 暂存文件
        run: git add --force assets/whitelist-blacklist/*.txt
        continue-on-error: true
          
      - name: 拉取最新代码并提交推送
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --cached --name-only | grep -q .; then
            git fetch origin main
            git commit -m "黑白名单 Update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') (CST)"
            git push origin HEAD:$GITHUB_REF_NAME --force
            echo "✅ 拉取最新代码并强制推送完成"
          else
            echo "ℹ️ 无文件变更，跳过提交和推送"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
